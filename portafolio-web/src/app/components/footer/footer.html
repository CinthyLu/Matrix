<footer class="w-full border-t border-dark-surface/40 bg-dark-bg/70 mt-16">
  <div class="mx-auto max-w-7xl px-6 py-10">

    <!-- GRID -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-10">

      <!-- Branding -->
      <div>
        <div class="flex items-center gap-3">
          <div class="h-10 w-10 rounded-md bg-neon-cyan/10 text-neon-cyan flex items-center justify-center font-bold">
            &lt;/&gt;
          </div>

          <div>
            <h2 class="text-white font-bold text-lg">
              Veltrix Estudio
            </h2>

            <p class="text-sm text-gray-400 mt-1 leading-relaxed">
              Desarrollo web moderno, inteligencia artificial y sistemas escalables.
            </p>
          </div>
        </div>
      </div>

      <!-- Navegación -->
      <div>
        <h3 class="text-xs uppercase tracking-[0.25em] text-gray-500 mb-4">
          Navegación
        </h3>

        <ul class="space-y-3">
          <li *ngFor="let link of navLinks">
            <a [href]="link.href" class="text-gray-300 hover:text-neon-cyan transition-colors">
              {{ link.label }}
            </a>
          </li>
        </ul>
      </div>

      <!-- Contacto -->
      <div>
        <h3 class="text-xs uppercase tracking-[0.25em] text-gray-500 mb-4">
          Contacto
        </h3>

        <div class="space-y-3 text-gray-300">
          <a [href]="'mailto:' + contacto.email" class="block hover:text-neon-cyan transition-colors">
            {{ contacto.email }}
          </a>

          <a [href]="contacto.github" target="_blank" class="block hover:text-neon-cyan transition-colors">
            GitHub
          </a>

          <a [href]="contacto.linkedin" target="_blank" class="block hover:text-neon-cyan transition-colors">
            LinkedIn
          </a>
        </div>
      </div>

      <!-- Colaboradores -->
      <div>
        <h3 class="text-xs uppercase tracking-[0.25em] text-gray-500 mb-4">
          Colaboradores
        </h3>
        <div class="space-y-4 text-gray-300">
          <div *ngFor="let p of coautores">
            <div class="font-semibold text-white text-xs mb-1">{{ p.name }}</div>
            <div class="flex items-center gap-3 text-gray-400 mt-1.5">
              <!-- Correo -->
              <a [href]="'mailto:'+p.email" title="Enviar correo" class="hover:text-neon-teal transition-colors">
                <svg class="h-4 w-4 stroke-current fill-none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                  <polyline points="22,6 12,13 2,6"/>
                </svg>
              </a>
              <!-- GitHub -->
              <a [href]="p.github" target="_blank" title="GitHub" class="hover:text-neon-teal transition-colors">
                <svg class="h-4 w-4 fill-current" viewBox="0 0 24 24">
                  <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
                </svg>
              </a>
              <!-- LinkedIn -->
              <a *ngIf="p.linkedin" [href]="p.linkedin" target="_blank" title="LinkedIn" class="hover:text-neon-teal transition-colors">
                <svg class="h-4 w-4 fill-current" viewBox="0 0 24 24">
                  <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
                </svg>
              </a>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Bottom -->
    <div class="border-t border-dark-surface/40 mt-8 pt-6 flex flex-col md:flex-row items-center justify-between gap-3 text-xs text-gray-500">
      <span>
        © {{ year }} {{ estudio }}
      </span>

      <span>
        {{ curso }}
      </span>
    </div>

  </div>
</footer>
